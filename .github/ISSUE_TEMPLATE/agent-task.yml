name: 🤖 Agent task (Claude + Codex)
description: Claude 와 Codex 가 함께 계획 → 토론 → 구현 → 상호 리뷰
title: "[Agent] "
labels: ["state:new"]
body:
  - type: markdown
    attributes:
      value: |
        이슈를 만들면 **Claude 와 Codex 가 자동으로 계획을 짜서** 댓글로 올려줍니다.
        좋은 결과를 받으려면 아래 필드를 가능한 한 구체적으로 채워주세요.
        궁금한 점은 나중에 `/claude <질문>`, `/codex <질문>`, `/both <질문>` 슬래시로 추가 질문할 수 있습니다.

        ℹ️ 자세한 사용법은 [agent-issue-guide.md](../blob/main/docs/workflows/agent-issue-guide.md) 를 참고하세요.

  - type: textarea
    id: what
    attributes:
      label: 무엇을 하고 싶나요?
      description: 한 줄 또는 한 단락. 비기술적인 표현이라도 OK.
      placeholder: |
        예) BO 거래 내역 V2 상세 페이지에서 hover 색깔이 너무 어두워요
        예) 회원권 시세 차트에 1주일/1개월 토글을 추가하고 싶어요
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 왜 필요한가요? (배경)
      description: 어떤 상황에서 문제이거나 왜 필요한지. **plan 품질에 큰 영향**을 줍니다.
      placeholder: |
        예) 어두운 모드에서 잘 안 보여서 사용자가 항목을 못 찾는다는 피드백을 받았습니다
        예) 시세를 길게 보고 싶다는 요청이 운영팀에서 반복적으로 들어옵니다
    validations:
      required: false

  - type: textarea
    id: where
    attributes:
      label: 어디에서 일어나나요? (화면 / URL / 파일 힌트)
      description: URL, 화면 이름, 파일 경로 등 위치를 짐작할 수 있는 무엇이든. 모르면 비워두셔도 됩니다.
      placeholder: |
        예)
        - URL: /bo/transactions/123
        - 화면: 거래 상세
        - 파일: apps/back-office/src/app/.../page.tsx
    validations:
      required: false

  - type: textarea
    id: done
    attributes:
      label: 어떻게 되면 끝났다고 볼까요? (완료 기준)
      description: 체크리스트로 적으면 가장 좋아요. 비워두면 에이전트가 추정합니다.
      placeholder: |
        - [ ] hover 시 색이 한 톤 밝아진다
        - [ ] type-check 통과
    validations:
      required: false

  - type: dropdown
    id: ui
    attributes:
      label: 화면(UI) 이 바뀌나요?
      description: "예 인 경우 PR 에 before/after 스크린샷이 자동 첨부됩니다."
      options:
        - "예 — 화면이 바뀝니다"
        - "아니오 — 백엔드/문서/설정만"
        - "모르겠어요"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ⏱ 이슈를 등록하면 보통 **30~120초 안에** Claude·Codex 의 계획 코멘트가 달립니다.
        라벨이 `state:plan-ready` 가 되면 `/implement claude` 또는 `/implement codex` 로 구현을 시작할 수 있어요.
        라벨이 `state:plan-disagree` 면 두 의견이 갈렸다는 뜻이라 댓글로 결정해 주세요.
        라벨이 `state:split-proposed` 면 작업이 큰 것 같으니 `/approve-split` 으로 나누거나 `/reject-split` 으로 그대로 진행할지 선택하세요.
